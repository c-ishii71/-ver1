<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>くみまち スタンプラリー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background: linear-gradient(#67b7dc, #7ec47a);
      color: #333;
    }

    .screen {
      min-height: 100vh;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    h1 {
      color: white;
      margin-top: 20px;
    }

    .card {
      background: #e8f6f3;
      border-radius: 16px;
      padding: 20px;
      margin: 20px auto;
      max-width: 320px;
    }

    button {
      background: #ffd84d;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }

    /* ===== スタンプ表示（枠なし・大きめ・縦並び） ===== */
    #stamp {
      display: none;
    }

    .stamps {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      max-width: 260px;
      margin: 30px auto;
    }

    .stamp img {
      width: 100%;
      height: auto;
    }

    /* ===== ポップアップ ===== */
    #popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }

    .popup-inner {
      background: white;
      margin: 40% auto;
      padding: 20px;
      width: 80%;
      border-radius: 16px;
    }

    .popup-inner h2 {
      margin-top: 0;
    }

    .popup-inner button {
      margin-top: 16px;
    }
  </style>
</head>

<body>

<!-- ===== TOP画面 ===== -->
<div id="top" class="screen">
  <h1>くみまち<br>スタンプラリー</h1>

  <div class="card">
    <strong>店内を回って<br>スタンプを集めよう！</strong>
  </div>

  <button onclick="goStamp()">スタンプラリー帳へ</button>
</div>

<!-- ===== スタンプ帳 ===== -->
<div id="stamp" class="screen">
  <h1>スタンプ帳</h1>
  <div id="stamps" class="stamps"></div>
</div>

<!-- ===== ポップアップ ===== -->
<div id="popup">
  <div class="popup-inner">
    <h2 id="popupMessage"></h2>
    <div id="popupButtons"></div>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
  const TOTAL = 5;

  function getStamps() {
    const saved = JSON.parse(localStorage.getItem("stamps") || "[]");
    return saved.length === TOTAL ? saved : Array(TOTAL).fill(false);
  }

  function saveStamps(stamps) {
    localStorage.setItem("stamps", JSON.stringify(stamps));
  }

  function goStamp() {
    document.getElementById("top").style.display = "none";
    document.getElementById("stamp").style.display = "block";
    renderStamps();
  }

  function renderStamps() {
    const container = document.getElementById("stamps");
    container.innerHTML = "";

    const stamps = getStamps();

    stamps.forEach((done, i) => {
      const img = document.createElement("img");
      img.src = done
        ? `画像/stamp${i + 1}.png`
        : `画像/stamp_empty.png`;
      container.appendChild(img);
    });

    if (stamps.every(Boolean)) {
      showPrizePopup();
    }
  }

  /* ===== ポップアップ制御 ===== */
  function showPopup(text) {
    document.getElementById("popupMessage").textContent = text;
    document.getElementById("popupButtons").innerHTML = "";
    document.getElementById("popup").style.display = "block";
  }

  function showPrizePopup() {
    document.getElementById("popupMessage").textContent =
      "🎉 5つそろいました！景品をえらんでね";
    document.getElementById("popupButtons").innerHTML = `
      <button onclick="alert('景品Aと交換！')">景品A</button><br><br>
      <button onclick="alert('景品Bと交換！')">景品B</button>
    `;
    document.getElementById("popup").style.display = "block";
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }

  /* ===== QR (?stamp=1〜5) ===== */
  const params = new URLSearchParams(location.search);
  const num = Number(params.get("stamp"));

  if (num >= 1 && num <= TOTAL) {
    const stamps = getStamps();
    if (!stamps[num - 1]) {
      stamps[num - 1] = true;
      saveStamps(stamps);
      showPopup(`スタンプ${num}をゲット！`);
    }
    goStamp();
  }
</script>

</body>
</html>
