<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>くみまち スタンプラリー</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(#2ea3c7, #6fb06f);
}

/* ヘッダー */
.header {
  padding-top: 20px;
}
.header-title {
  color: white;
  font-size: 20px;
  font-weight: bold;
}

/* タイトル */
.main-title {
  color: white;
  font-size: 32px;
  font-weight: bold;
  margin: 20px 0;
}

/* スタンプ帳 */
#stamp {
  display: none;
}

.stamps {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  max-width: 340px;
  margin: 30px auto;
}

.stamp {
  display: flex;
  justify-content: center;
}

.stamp img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
}

/* ボタン */
button {
  background: #ffd84d;
  border: none;
  border-radius: 999px;
  padding: 14px 28px;
  font-size: 16px;
  margin-top: 20px;
}

/* ポップアップ */
#popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.popup-inner {
  background: white;
  margin: 40% auto;
  padding: 20px;
  width: 80%;
  border-radius: 16px;
}
</style>
</head>

<body>

<!-- TOP -->
<div id="top">
  <div class="header">
    <div class="header-title">くみまち</div>
  </div>

  <div class="main-title">スタンプラリー</div>

  <button onclick="goStamp()">スタンプ帳を見る</button>
</div>

<!-- スタンプ帳 -->
<div id="stamp">
  <div class="main-title">スタンプ帳</div>
  <div id="stamps" class="stamps"></div>
</div>

<!-- ポップアップ -->
<div id="popup">
  <div class="popup-inner">
    <h2 id="popupMessage"></h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
const TOTAL = 5;

function getStamps() {
  const s = JSON.parse(localStorage.getItem("stamps") || "[]");
  return s.length === TOTAL ? s : Array(TOTAL).fill(false);
}

function saveStamps(s) {
  localStorage.setItem("stamps", JSON.stringify(s));
}

function goStamp() {
  document.getElementById("top").style.display = "none";
  document.getElementById("stamp").style.display = "block";
  renderStamps();
}

function renderStamps() {
  const c = document.getElementById("stamps");
  c.innerHTML = "";
  const s = getStamps();

  s.forEach((done, i) => {
    const d = document.createElement("div");
    d.className = "stamp";
    const img = document.createElement("img");
    img.src = done ? `画像/stamp${i+1}.png` : `画像/stamp_empty.png`;
    d.appendChild(img);
    c.appendChild(d);
  });

  if (s.every(Boolean)) showPopup("🎉 景品交換できます！");
}

function showPopup(text) {
  document.getElementById("popupMessage").textContent = text;
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

const p = new URLSearchParams(location.search);
const n = Number(p.get("stamp"));
if (n >= 1 && n <= TOTAL) {
  const s = getStamps();
  if (!s[n-1]) {
    s[n-1] = true;
    saveStamps(s);
    showPopup(`スタンプ${n}ゲット！`);
  }
  goStamp();
}
</script>

</body>
</html>
